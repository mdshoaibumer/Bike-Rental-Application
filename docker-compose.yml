version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bike_rental_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-bikerental}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bikerental_secret}
      POSTGRES_DB: ${DB_NAME:-bikerental}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-bikerental} -d ${DB_NAME:-bikerental}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bike_rental_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://${DB_USER:-bikerental}:${DB_PASSWORD:-bikerental_secret}@db:5432/${DB_NAME:-bikerental}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET:-change-this-to-a-secure-32-char-min-secret}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW_SECONDS=60
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - app_network

volumes:
  postgres_data:
    driver: local

networks:
  app_network:
    driver: bridge
