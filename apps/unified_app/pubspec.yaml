name: unified_app
description: Customer App for Bike Rental Platform
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  shared:
    path: ../../shared
  go_router: ^12.1.1
  flutter_riverpod: ^2.4.3
  faker: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  golden_toolkit: ^0.15.0
  mockito: ^5.4.4
  mocktail: ^1.0.1
  build_runner: ^2.4.8
  fake_async: ^1.3.1
  dio: ^5.3.3
  google_fonts: 6.1.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/bikes/
