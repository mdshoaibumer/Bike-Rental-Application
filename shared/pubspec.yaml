name: shared
description: Shared UI components, themes, and core utilities for Bike Rental apps.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.3.3
  go_router: ^12.1.1
  flutter_riverpod: ^2.4.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  google_fonts: 6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  freezed: ^2.4.1
  json_serializable: ^8.0.0
  flutter_lints: ^2.0.0
